# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:fixitdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=

# Disable H2 console in tests
spring.h2.console.enabled=false

# Disable Liquibase for tests — Hibernate manages the schema
spring.liquibase.enabled=false

# Fix H2 CHECK constraint bug (H2 2.2.240 session comparator issue)
spring.test.database.replace=none
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
